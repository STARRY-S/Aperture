name: Doxygen docs

on:
  push:
    branches:
      - main
jobs:
  doxygen-docs:
    runs-on: ubuntu-latest
    container:
      image: archlinux
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Doxygen
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm doxygen git
          cd $GITHUB_WORKSPACE/
          doxygen Doxyfile
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/doxygen/html
